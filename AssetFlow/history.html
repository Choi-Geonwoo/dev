<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>History - Smart Wallet Pro</title>
    <style>
        /* 페이지 전용 스타일 */
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table th { text-align: left; padding: 15px; border-bottom: 2px solid var(--border); color: #64748b; font-size: 0.9rem; }
        .table td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        .amount.minus { color: var(--expense); font-weight: bold; }
        .amount.plus { color: var(--income); font-weight: bold; }
        .badge { background: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge-cat { background: #eef2ff; color: var(--primary); }

        /* 모달 스타일 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); place-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: var(--radius); width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #64748b; margin-top: 15px; }
        .input-field { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; }
        .input-field:focus { border-color: var(--primary); }

        .btn-delete { color: var(--expense); border: none; background: none; cursor: pointer; font-size: 0.85rem; padding: 5px; }
        .btn-delete:hover { text-decoration: underline; }

        /* [3] 캘린더 스타일 */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 15px; }
        .cal-cell {
            min-height: 100px; /* 금액이 들어갈 자리를 위해 높이 확보 */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 날짜는 위, 금액은 아래 배치 */
            padding: 8px;
            border: 1px solid #e2e8f0;
            background: #fff;
            border-radius: 8px;
        }
        .cal-cell:hover { border-color: var(--primary); transform: translateY(-2px); }
        .cal-date { font-weight: bold; font-size: 0.9rem; }
        .cal-item {
            font-size: 0.7rem;
            background: #f1f5f9;
            padding: 2px 4px;
            margin-bottom: 2px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cal-total { margin-top: auto; text-align: right; color: var(--expense); font-weight: bold; font-size: 0.75rem; }

        /* [1] 기존 스타일 유지 및 전환 버튼 추가 */
        .view-controls { display: flex; background: #f1f5f9; padding: 5px; border-radius: 10px; margin-bottom: 20px; width: fit-content; }
        .view-btn { padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; background: transparent; color: #64748b; font-weight: 600; transition: 0.2s; }
        .view-btn.active { background: #fff; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        #listView, #calendarView { display: none; }
        #listView.active, #calendarView.active { display: block; }

        /* 오늘 날짜 셀 강조 */
        .cal-cell.today {
            border: 2px solid var(--primary);
            background-color: #f0f7ff;
        }

        /* 이전/다음 버튼 크기 조절 */
        .calendar-view .btn-outline {
            padding: 5px 12px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <h2>Smart Wallet</h2>
    <ul class="nav-menu">
        <li><a href="index.html" class="nav-item">🏠 대시보드</a></li>
        <li><a href="history.html" class="nav-item active">📜 거래 내역</a></li>
        <li><a href="assets.html" class="nav-item">🏦 자산 관리</a></li>
        <li><a href="categories.html" class="nav-item">🏷️ 카테고리 설정</a></li>
    </ul>
</nav>

<main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>거래 내역</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" onclick="openHistoryModal()">+ 직접 입력</button>
            <!--<button class="btn btn-primary" onclick="alert('엑셀 업로드 기능은 개발 중입니다!')">📁 엑셀 업로드</button>-->
            <button class="btn btn-primary" onclick="openUploadModal()">📁 엑셀 업로드</button>
        </div>
    </div>

        <div class="view-controls">
            <button id="btnList" class="view-btn active" onclick="switchView('list')">리스트 보기</button>
            <button id="btnCal" class="view-btn" onclick="switchView('cal')">캘린더 보기</button>
        </div>

    <div class="card" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="searchInput" placeholder="내용으로 검색..." class="input-field" style="flex: 2; margin:0;">
        <select id="filterAsset" class="input-field" style="flex: 1; margin:0;">
            <option value="">모든 자산</option>
        </select>
        <select id="filterCategory" class="input-field" style="flex: 1; margin:0;">
            <option value="">모든 카테고리</option>
        </select>
    </div>



    <div class="card">
        <table class="table">
            <thead>
            <tr>
                <th>날짜</th>
                <th>자산</th>
                <th>카테고리</th>
                <th>내용</th>
                <th>금액</th>
                <th style="text-align: right;">관리</th>
            </tr>
            </thead>
            <tbody id="historyList">
            </tbody>
        </table>
    </div>
    <div id="calendarView" class="card" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 12px;">
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-outline" onclick="changeMonth(-1)" style="padding: 5px 15px;">◀</button>
                <button class="btn btn-outline" onclick="goToday()" style="padding: 5px 15px;">오늘</button>
                <button class="btn btn-outline" onclick="changeMonth(1)" style="padding: 5px 15px;">▶</button>
            </div>
            <h3 id="calMonthTitle" style="margin: 0; color: var(--primary); font-size: 1.25rem;">2026년 3월</h3>
            <div style="width: 120px; text-align: right; font-size: 0.9rem; color: #64748b;">
                월간 지출: <span id="monthTotalAmount" style="color: var(--expense); font-weight: bold;">0</span>원
            </div>
        </div>

        <div class="cal-grid" id="historyCalGrid"></div>
    </div>
</main>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <h3>새 거래 내역 추가</h3>
        <div style="margin: 10px 0;">
            <label class="label">날짜</label>
            <input type="date" id="historyDate" class="input-field">

            <label class="label">자산 선택</label>
            <select id="historyAsset" class="input-field"></select>

            <label class="label">카테고리</label>
            <select id="historyCategory" class="input-field">
            </select>

            <label class="label">내용</label>
            <input type="text" id="historyDesc" placeholder="예: 스타벅스 강남점" class="input-field">

            <label class="label">금액 (원)</label>
            <input type="number" id="historyAmount" placeholder="0" class="input-field">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn btn-outline" style="flex:1" onclick="closeHistoryModal()">취소</button>
            <button class="btn btn-primary" style="flex:2" onclick="saveHistory()">저장하기</button>
        </div>
    </div>
</div>

<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h3>📁 엑셀 내역 업로드</h3>
        <div style="margin: 20px 0;">
            <label class="label">대상 자산 선택</label>
            <select id="uploadAssetSelect" class="input-field"></select>

            <label class="label" style="margin-top:20px;">엑셀 파일 선택 (.csv)</label>

            <label for="excelFile" class="file-upload-label">
                <span>📁 클릭하여 파일 선택</span>
            </label>

            <input type="file" id="excelFile" accept=".csv" onchange="updateFileName(this)">

            <div id="fileNameDisplay">선택된 파일 없음</div>

            <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 10px;">
                * 파일의 첫 줄은 '날짜, 내용, 금액' 순서여야 합니다.
            </p>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-outline" style="flex:1" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" style="flex:2" onclick="processUpload()">업로드 시작</button>
        </div>
    </div>
</div>


<script>
    // 1. 초기 데이터 로드 및 전역 변수
    let histories = JSON.parse(localStorage.getItem('myHistories')) || [];
    let assets = JSON.parse(localStorage.getItem('myAssets')) || [];
    let categories = JSON.parse(localStorage.getItem('myCategories')) || [
        {name: '식비'}, {name: '교통'}, {name: '주거/통신'}, {name: '쇼핑'}
    ];

    // 2. 초기 화면 렌더링 및 필터 설정
    document.addEventListener('DOMContentLoaded', () => {
        initFilters();
        renderHistories();
    });

    // 자산 및 카테고리 필터(Select Box) 옵션 초기화
    function initFilters() {
        const filterAsset = document.getElementById('filterAsset');
        const filterCategory = document.getElementById('filterCategory');

        if (filterAsset) {
            filterAsset.innerHTML = '<option value="">모든 자산</option>' +
                assets.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        }
        if (filterCategory) {
            filterCategory.innerHTML = '<option value="">모든 카테고리</option>' +
                categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }

        // 필터 이벤트 바인딩
        document.getElementById('searchInput').addEventListener('input', renderHistories);
        document.getElementById('filterAsset').addEventListener('change', renderHistories);
        document.getElementById('filterCategory').addEventListener('change', renderHistories);
    }

    // 3. 뷰 전환 로직 (리스트 <-> 캘린더)
    function switchView(type) {
        const listView = document.querySelector('.card:has(.table)'); // 테이블을 포함한 카드 찾기
        const calendarView = document.getElementById('calendarView');
        const btnList = document.getElementById('btnList');
        const btnCal = document.getElementById('btnCal');

        if (type === 'list') {
            listView.style.display = 'block';
            calendarView.style.display = 'none';
            btnList.classList.add('active');
            btnCal.classList.remove('active');
            renderHistories();
        } else {
            listView.style.display = 'none';
            calendarView.style.display = 'block';
            btnList.classList.remove('active');
            btnCal.classList.add('active');
            renderCalendar();
        }
    }

    // 4. 리스트 렌더링 (검색 및 필터링)
    function renderHistories() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const assetFilter = document.getElementById('filterAsset').value;
        const catFilter = document.getElementById('filterCategory').value;
        const container = document.getElementById('historyList');

        // 필터링 적용
        const filtered = histories.filter(item => {
            const matchesSearch = item.description.toLowerCase().includes(searchTerm);
            const matchesAsset = assetFilter === "" || String(item.assetId) === String(assetFilter);
            const matchesCat = catFilter === "" || item.category === catFilter;
            return matchesSearch && matchesAsset && matchesCat;
        }).sort((a, b) => new Date(b.date) - new Date(a.date));

        if (filtered.length === 0) {
            container.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px; color:#94a3b8;">거래 내역이 없습니다.</td></tr>';
            return;
        }

        container.innerHTML = filtered.map(h => `
            <tr>
                <td>${h.date}</td>
                <td><span class="badge">${h.assetName}</span></td>
                <td><span class="badge badge-cat">${h.category}</span></td>
                <td>${h.description}</td>
                <td class="amount minus">-${Number(h.amount).toLocaleString()}원</td>
                <td style="text-align: right;">
                    <button onclick="deleteHistory('${h.id}')" class="btn-delete">삭제</button>
                </td>
            </tr>
        `).join('');
    }

    // 5. 캘린더 렌더링
    function renderCalendar() {
        const grid = document.getElementById('historyCalGrid');
        grid.innerHTML = ['일','월','화','수','목','금','토'].map(d =>
            `<div style="text-align:center; font-weight:bold; font-size:0.8rem; color:#64748b; padding-bottom:10px;">${d}</div>`
        ).join('');

        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const lastDate = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

        // 시작 공백
        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

        // 날짜 셀 생성
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dayItems = histories.filter(h => h.date === dateStr);
            const daySum = dayItems.reduce((s, h) => s + Number(h.amount), 0);

            const cell = document.createElement('div');
            cell.className = 'cal-cell';
            cell.innerHTML = `
                <div class="cal-date">${d}</div>
                ${dayItems.slice(0, 2).map(h => `<div class="cal-item">${h.description}</div>`).join('')}
                ${dayItems.length > 2 ? `<div class="cal-item" style="background:#f1f5f9; color:#64748b;">+${dayItems.length - 2}</div>` : ''}
                ${daySum > 0 ? `<div class="cal-total">-${daySum.toLocaleString()}원</div>` : ''}
            `;
            grid.appendChild(cell);
        }
    }

    // 6. 모달 및 파일 핸들링
    function openHistoryModal() {
        if (assets.length === 0) return alert("자산을 먼저 등록해주세요!");
        document.getElementById('historyAsset').innerHTML = assets.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        document.getElementById('historyCategory').innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        document.getElementById('historyDate').value = new Date().toISOString().substring(0, 10);
        document.getElementById('historyModal').style.display = 'grid';
    }

    function closeHistoryModal() { document.getElementById('historyModal').style.display = 'none'; }

    function openUploadModal() {
        document.getElementById('uploadAssetSelect').innerHTML = assets.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        document.getElementById('uploadModal').style.display = 'grid';
    }

    function closeModal() { document.getElementById('uploadModal').style.display = 'none'; }

    function updateFileName(input) {
        document.getElementById('fileNameDisplay').innerText = input.files[0] ? `📄 선택됨: ${input.files[0].name}` : "선택된 파일 없음";
    }

    // 7. 데이터 저장 및 삭제 로직
    function saveHistory() {
        const assetId = document.getElementById('historyAsset').value;
        const amount = parseInt(document.getElementById('historyAmount').value);
        const desc = document.getElementById('historyDesc').value;
        if (!desc || isNaN(amount)) return alert("내용과 금액을 입력해주세요.");

        const targetAsset = assets.find(a => String(a.id) === String(assetId));

        const newEntry = {
            id: Date.now().toString(), // 고유 ID 부여
            date: document.getElementById('historyDate').value,
            assetId,
            assetName: targetAsset.name,
            category: document.getElementById('historyCategory').value,
            description: desc,
            amount: amount
        };

        histories.push(newEntry);
        targetAsset.balance -= amount; // 자산 연동 차감

        syncAndRefresh();
        closeHistoryModal();
    }

    function processUpload() {
        const assetId = document.getElementById('uploadAssetSelect').value;
        const targetAsset = assets.find(a => String(a.id) === String(assetId));
        const fileInput = document.getElementById('excelFile');

        if (!fileInput.files.length) return alert("파일을 선택해주세요.");

        // CSV 파싱 로직의 Mockup (실제 구현 시 FileReader 사용 가능)
        const mockExcelData = [
            { date: new Date().toISOString().substring(0, 10), description: "업로드 테스트1", amount: 15000 },
            { date: new Date().toISOString().substring(0, 10), description: "업로드 테스트2", amount: 3200 }
        ];

        mockExcelData.forEach(row => {
            histories.push({
                id: (Date.now() + Math.random()).toString(),
                date: row.date,
                assetId,
                assetName: targetAsset.name,
                category: "미분류",
                description: row.description,
                amount: row.amount
            });
            targetAsset.balance -= row.amount;
        });

        syncAndRefresh();
        closeModal();
        alert("업로드가 완료되었습니다.");
    }

    function deleteHistory(id) {
        if (!confirm("삭제하시겠습니까? (자산 잔액이 복구됩니다)")) return;

        const index = histories.findIndex(h => h.id === id);
        if (index !== -1) {
            const item = histories[index];
            const asset = assets.find(a => String(a.id) === String(item.assetId));
            if (asset) asset.balance += Number(item.amount); // 잔액 복구

            histories.splice(index, 1);
            syncAndRefresh();
        }
    }

    // 8. 로컬 스토리지 동기화 및 화면 갱신
    function syncAndRefresh() {
        localStorage.setItem('myHistories', JSON.stringify(histories));
        localStorage.setItem('myAssets', JSON.stringify(assets));
        renderHistories();
        renderCalendar();
    }

    // [추가] 현재 캘린더가 보여주고 있는 기준 날짜 (기본값: 오늘)
let viewDate = new Date();

// [수정] 캘린더 렌더링 함수
function renderCalendar() {
    const grid = document.getElementById('historyCalGrid');
    const monthTitle = document.getElementById('calMonthTitle');

    // 현재 보고 있는 연/월 추출
    const year = viewDate.getFullYear();
    const month = viewDate.getMonth(); // 0 ~ 11

    // 제목 업데이트
    monthTitle.innerText = `${year}년 ${month + 1}월`;

    grid.innerHTML = ['일','월','화','수','목','금','토'].map(d =>
        `<div style="text-align:center; font-weight:bold; font-size:0.8rem; color:#64748b; padding-bottom:10px;">${d}</div>`
    ).join('');

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    // 시작 공백
    for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

    // 날짜 셀 생성
    for (let d = 1; d <= lastDate; d++) {
        // 비교를 위해 YYYY-MM-DD 형식 생성
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

        const dayItems = histories.filter(h => h.date === dateStr);
        const daySum = dayItems.reduce((s, h) => s + Number(h.amount), 0);

        const isToday = new Date().toISOString().substring(0, 10) === dateStr;

        const cell = document.createElement('div');
        cell.className = `cal-cell ${isToday ? 'today' : ''}`; // 오늘 날짜 강조 클래스(선택)

        cell.innerHTML = `
            <div class="cal-date" style="${isToday ? 'color:var(--primary);' : ''}">${d}</div>
            ${dayItems.slice(0, 2).map(h => `<div class="cal-item">${h.description}</div>`).join('')}
            ${dayItems.length > 2 ? `<div class="cal-item" style="background:#f1f5f9; color:#64748b;">+${dayItems.length - 2}</div>` : ''}
            ${daySum > 0 ? `<div class="cal-total">-${daySum.toLocaleString()}원</div>` : ''}
        `;
        grid.appendChild(cell);
    }
}

// [추가] 월 변경 함수
function changeMonth(offset) {
    // viewDate의 월을 offset만큼 가감
    viewDate.setMonth(viewDate.getMonth() + offset);
    renderCalendar();
}

// 1. 오늘 날짜로 이동
function goToday() {
    viewDate = new Date();
    renderCalendar();
}

// 2. 월 변경 함수 (offset: -1 이면 이전달, 1 이면 다음달)
function changeMonth(offset) {
    viewDate.setMonth(viewDate.getMonth() + offset);
    renderCalendar();
}

// 3. 캘린더 렌더링 함수 (확장판)
function renderCalendar() {
    const grid = document.getElementById('historyCalGrid');
    const monthTitle = document.getElementById('calMonthTitle');

    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();

    monthTitle.innerText = `${year}년 ${month + 1}월`;

    // 요일 헤더
    const days = ['일','월','화','수','목','금','토'];

    grid.innerHTML = days.map((d, i) => {
        let color = '#64748b'; // 기본 색상

        if (i === 0) color = '#ef4444'; // 일요일 (빨강)
        if (i === 6) color = '#3b82f6'; // 토요일 (파랑)

        return `
            <div style="
                text-align:center;
                font-weight:bold;
                font-size:0.8rem;
                color:${color};
                padding-bottom:10px;
            ">
                ${d}
            </div>
        `;
    }).join('');

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    // 공백 채우기
    for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

    // 날짜별 셀 생성
    for (let d = 1; d <= lastDate; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

        // 1. 해당 날짜의 모든 내역 필터링
        const dayItems = histories.filter(h => h.date === dateStr);

        // 2. 해당 날짜의 총 지출 금액 합산
        const daySum = dayItems.reduce((acc, cur) => acc + Number(cur.amount), 0);

        const cell = document.createElement('div');
        cell.className = 'cal-cell';

        // 셀 내부 구성: 날짜 + 내역(최대2개) + [추가] 총 금액
        cell.innerHTML = `
            <div class="cal-date">${d}</div>
            <div class="cal-content" style="flex: 1; overflow: hidden;">
                ${dayItems.slice(0, 2).map(h => `<div class="cal-item">${h.description}</div>`).join('')}
            </div>
            ${daySum > 0 ? `<div class="cal-total" style="color: #e11d48; font-weight: bold; font-size: 0.75rem; text-align: right; margin-top: 5px;">
                -${daySum.toLocaleString()}원
            </div>` : ''}
        `;

        grid.appendChild(cell);
    }
}

// [수정] switchView 함수에서 캘린더 호출 시 renderCalendar()가 정상 작동하도록 연결
function switchView(type) {
    const listView = document.querySelector('.card:has(.table)');
    const calendarView = document.getElementById('calendarView');
    const btnList = document.getElementById('btnList');
    const btnCal = document.getElementById('btnCal');

    if (type === 'list') {
        listView.style.display = 'block';
        calendarView.style.display = 'none';
        btnList.classList.add('active');
        btnCal.classList.remove('active');
        renderHistories();
    } else {
        listView.style.display = 'none';
        calendarView.style.display = 'block';
        btnList.classList.remove('active');
        btnCal.classList.add('active');
        renderCalendar(); // 여기서 확장된 캘린더 호출
    }
}
</script>
