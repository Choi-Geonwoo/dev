<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>History - Smart Wallet Pro</title>
    <style>
        /* 페이지 전용 스타일 */
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table th { text-align: left; padding: 15px; border-bottom: 2px solid var(--border); color: #64748b; font-size: 0.9rem; }
        .table td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        .amount.minus { color: var(--expense); font-weight: bold; }
        .amount.plus { color: var(--income); font-weight: bold; }
        .badge { background: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge-cat { background: #eef2ff; color: var(--primary); }

        /* 모달 스타일 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); place-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: var(--radius); width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #64748b; margin-top: 15px; }
        .input-field { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; }
        .input-field:focus { border-color: var(--primary); }

        .btn-delete { color: var(--expense); border: none; background: none; cursor: pointer; font-size: 0.85rem; padding: 5px; }
        .btn-delete:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav class="sidebar">
    <h2>Smart Wallet</h2>
    <ul class="nav-menu">
        <li><a href="index.html" class="nav-item">🏠 대시보드</a></li>
        <li><a href="history.html" class="nav-item active">📜 거래 내역</a></li>
        <li><a href="assets.html" class="nav-item">🏦 자산 관리</a></li>
        <li><a href="categories.html" class="nav-item">🏷️ 카테고리 설정</a></li>
    </ul>
</nav>

<main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>거래 내역</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" onclick="openHistoryModal()">+ 직접 입력</button>
            <!--<button class="btn btn-primary" onclick="alert('엑셀 업로드 기능은 개발 중입니다!')">📁 엑셀 업로드</button>-->
            <button class="btn btn-primary" onclick="openUploadModal()">📁 엑셀 업로드</button>
        </div>
    </div>

    <div class="card" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="searchInput" placeholder="내용으로 검색..." class="input-field" style="flex: 2; margin:0;">
        <select id="filterAsset" class="input-field" style="flex: 1; margin:0;">
            <option value="">모든 자산</option>
        </select>
        <select id="filterCategory" class="input-field" style="flex: 1; margin:0;">
            <option value="">모든 카테고리</option>
        </select>
    </div>

    <div class="card">
        <table class="table">
            <thead>
            <tr>
                <th>날짜</th>
                <th>자산</th>
                <th>카테고리</th>
                <th>내용</th>
                <th>금액</th>
                <th style="text-align: right;">관리</th>
            </tr>
            </thead>
            <tbody id="historyList">
            </tbody>
        </table>
    </div>
</main>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <h3>새 거래 내역 추가</h3>
        <div style="margin: 10px 0;">
            <label class="label">날짜</label>
            <input type="date" id="historyDate" class="input-field">

            <label class="label">자산 선택</label>
            <select id="historyAsset" class="input-field"></select>

            <label class="label">카테고리</label>
            <select id="historyCategory" class="input-field">
            </select>

            <label class="label">내용</label>
            <input type="text" id="historyDesc" placeholder="예: 스타벅스 강남점" class="input-field">

            <label class="label">금액 (원)</label>
            <input type="number" id="historyAmount" placeholder="0" class="input-field">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn btn-outline" style="flex:1" onclick="closeHistoryModal()">취소</button>
            <button class="btn btn-primary" style="flex:2" onclick="saveHistory()">저장하기</button>
        </div>
    </div>
</div>

<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h3>📁 엑셀 내역 업로드</h3>
        <div style="margin: 20px 0;">
            <label class="label">대상 자산 선택</label>
            <select id="uploadAssetSelect" class="input-field"></select>

            <label class="label" style="margin-top:20px;">엑셀 파일 선택 (.csv)</label>

            <label for="excelFile" class="file-upload-label">
                <span>📁 클릭하여 파일 선택</span>
            </label>

            <input type="file" id="excelFile" accept=".csv" onchange="updateFileName(this)">

            <div id="fileNameDisplay">선택된 파일 없음</div>

            <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 10px;">
                * 파일의 첫 줄은 '날짜, 내용, 금액' 순서여야 합니다.
            </p>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-outline" style="flex:1" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" style="flex:2" onclick="processUpload()">업로드 시작</button>
        </div>
    </div>
</div>


<script>
    // 1. 데이터 불러오기
    let histories = JSON.parse(localStorage.getItem('myHistories')) || [];
    let assets = JSON.parse(localStorage.getItem('myAssets')) || [];
    let categories = JSON.parse(localStorage.getItem('myCategories')) || [
        {id: 1, name: '식비'}, {id: 2, name: '교통'}, {id: 3, name: '주거/통신'}, {id: 4, name: '쇼핑'}
    ];

    const historyListContainer = document.getElementById('historyList');

    // 2. 화면에 내역 리스트 그리기
    function renderHistories() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const assetFilter = document.getElementById('filterAsset').value;
        const catFilter = document.getElementById('filterCategory').value;

        historyListContainer.innerHTML = '';

        // 필터링 로직 적용
        const filtered = histories.filter(item => {
            const matchesSearch = item.description.toLowerCase().includes(searchTerm);
            const matchesAsset = assetFilter === "" || item.assetId === assetFilter;
            const matchesCat = catFilter === "" || item.category === catFilter;
            return matchesSearch && matchesAsset && matchesCat;
        });

        historyListContainer.innerHTML = '';
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

        if (filtered.length === 0) {
            historyListContainer.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px; color:#94a3b8;">거래 내역이 없습니다.</td></tr>';
        }

        filtered.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.date}</td>
                <td><span class="badge">${item.assetName}</span></td>
                <td><span class="badge badge-cat">${item.category}</span></td>
                <td>${item.description}</td>
                <td class="amount minus">-${Number(item.amount).toLocaleString()}원</td>
                <td style="text-align: right;"><button onclick="deleteHistory(${index})" class="btn-delete">삭제</button></td>
            `;
            historyListContainer.appendChild(tr);
        });
        localStorage.setItem('myHistories', JSON.stringify(filtered));
    }

    // 3. 모달 열기 및 옵션 초기화
    function openHistoryModal() {
        // 최신 자산 및 카테고리 데이터 로드
        assets = JSON.parse(localStorage.getItem('myAssets')) || [];
        if (assets.length === 0) {
            alert("먼저 '자산 관리' 페이지에서 자산을 등록해주세요!");
            location.href = 'assets.html';
            return;
        }

        // 자산 셀렉트 박스 채우기
        const assetSelect = document.getElementById('historyAsset');
        assetSelect.innerHTML = assets.map(a => `<option value="${a.id}">${a.name}</option>`).join('');

        // 카테고리 셀렉트 박스 채우기
        const categorySelect = document.getElementById('historyCategory');
        categorySelect.innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');

        // 기본값 설정
        document.getElementById('historyDate').value = new Date().toISOString().substring(0, 10);
        document.getElementById('historyModal').style.display = 'grid';
    }

    function closeHistoryModal() {
        document.getElementById('historyModal').style.display = 'none';
    }

    // 4. 저장 및 자산 연동 로직
    function saveHistory() {
        const date = document.getElementById('historyDate').value;
        const assetId = document.getElementById('historyAsset').value;
        const category = document.getElementById('historyCategory').value;
        const description = document.getElementById('historyDesc').value;
        const amount = parseInt(document.getElementById('historyAmount').value);

        if (!description || !amount) return alert("내용과 금액을 입력해주세요.");

        // 자산 잔액 차감 로직
        const assetIndex = assets.findIndex(a => a.id == assetId);
        if (assetIndex !== -1) {
            assets[assetIndex].balance -= amount;
            localStorage.setItem('myAssets', JSON.stringify(assets));

            // 내역 객체 생성
            const newEntry = {
                date,
                assetId,
                assetName: assets[assetIndex].name,
                category,
                description,
                amount
            };

            histories.push(newEntry);
            renderHistories();
            closeHistoryModal();

            // 입력 폼 초기화
            document.getElementById('historyDesc').value = '';
            document.getElementById('historyAmount').value = '';
        }
    }

    // 5. 삭제 및 자산 복구 로직
    function deleteHistory(index) {
        if(confirm("내역을 삭제하시겠습니까? (삭제 시 해당 자산 잔액이 복구됩니다)")) {
            const item = histories[index];
            const assetIndex = assets.findIndex(a => a.id == item.assetId);

            if (assetIndex !== -1) {
                assets[assetIndex].balance += Number(item.amount); // 금액 복구
                localStorage.setItem('myAssets', JSON.stringify(assets));
            }

            histories.splice(index, 1);
            renderHistories();
        }
    }

    // 초기 실행
    document.addEventListener('DOMContentLoaded', renderHistories);

    // 1. 업로드 모달 열기 (자산 목록 업데이트)
function openUploadModal() {
    assets = JSON.parse(localStorage.getItem('myAssets')) || [];
    const uploadSelect = document.getElementById('uploadAssetSelect');

    if (assets.length === 0) {
        alert("자산을 먼저 등록해주세요!");
        location.href = 'assets.html';
        return;
    }

    // 자산 목록 주입
    uploadSelect.innerHTML = assets.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    document.getElementById('uploadModal').style.display = 'grid';
}

function closeModal() {
    document.getElementById('uploadModal').style.display = 'none';
}

// 2. 업로드 처리 로직 (매칭 핵심)
function processUpload() {
    const assetId = document.getElementById('uploadAssetSelect').value;
    const fileInput = document.getElementById('excelFile');

    if (!fileInput.files.length) return alert("파일을 선택해주세요.");

    // 선택된 자산 정보 가져오기
    const targetAsset = assets.find(a => a.id == assetId);

    /* [참고] 실제 구현 시에는 FileReader를 통해 엑셀 내용을 읽습니다.
       여기서는 파일의 한 줄을 읽었다고 가정(Mockup)한 로직입니다.
    */
    const mockExcelData = [
        { date: "2026-03-25", description: "마트 장보기", amount: 45000 },
        { date: "2026-03-24", description: "주유비", amount: 60000 }
    ];

    mockExcelData.forEach(row => {
        // [핵심 매칭] 엑셀 데이터 + 선택한 자산 정보 결합
        const newEntry = {
            date: row.date,
            assetId: targetAsset.id,     // 선택한 자산 ID 매칭
            assetName: targetAsset.name, // 선택한 자산 이름 매칭
            category: "미분류",           // 카테고리는 추후 AI나 키워드로 분류
            description: row.description,
            amount: row.amount
        };

        // 1. 내역 저장
        histories.push(newEntry);

        // 2. 자산 잔액 실시간 차감 (연동)
        targetAsset.balance -= row.amount;
    });

    // 전체 데이터 업데이트 및 저장
    localStorage.setItem('myHistories', JSON.stringify(histories));
    localStorage.setItem('myAssets', JSON.stringify(assets));

    alert(`${targetAsset.name}으로 ${mockExcelData.length}건의 내역이 성공적으로 업로드되었습니다!`);
    renderHistories();
    closeModal();
}
</script>

</body>
</html>
