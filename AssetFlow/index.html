<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Clarity - Dashboard</title>
    <style>
        /* 캘린더 전용 스타일 */
        .calendar-container { background: #fff; padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-label { font-size: 0.75rem; color: #64748b; font-weight: 600; padding-bottom: 10px; }
        .day-cell {
            aspect-ratio: 1 / 1.1;
            border-radius: 8px;
            border: 1px solid #f1f5f9;
            padding: 5px;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.2s;
        }
        .day-cell:hover { background: #f8fafc; border-color: var(--primary); }
        .day-cell.today { border: 2px solid var(--primary); background: #eff6ff; }
        .day-cell .date-num { font-weight: 500; }
        .day-cell .day-sum { font-size: 0.65rem; color: var(--expense); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 레이아웃 분할 */
        .dashboard-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; align-items: start; }
        .side-stack { display: flex; flex-direction: column; gap: 20px; }
    </style>
</head>
<body>

<nav class="sidebar">
    <h2>Clarity</h2>
    <ul class="nav-menu">
        <li><a href="index.html" class="nav-item active">🏠 대시보드</a></li>
        <li><a href="history.html" class="nav-item">📜 거래 내역</a></li>
        <li><a href="assets.html" class="nav-item">🏦 자산 관리</a></li>
        <li><a href="categories.html" class="nav-item">🏷️ 카테고리 설정</a></li>
    </ul>
</nav>

<main class="main-content">
    <header style="margin-bottom: 25px;">
        <h1 id="monthTitle">2026년 3월 리포트 📈</h1>
    </header>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px;">
        <div class="card">
            <span style="font-size: 0.85rem; color: #64748b;">전체 자산 합계</span>
            <h2 id="totalBalance">0원</h2>
        </div>
        <div class="card">
            <span style="font-size: 0.85rem; color: #64748b;">이번 달 총 지출</span>
            <h2 id="monthExpense" style="color:var(--expense)">0원</h2>
        </div>
        <div class="card">
            <span style="font-size: 0.85rem; color: #64748b;">오늘의 지출</span>
            <h2 id="todayExpense">0원</h2>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="calendar-container">
            <div class="calendar-header">
                <h4 id="calMonth">March 2026</h4>
                <div style="font-size: 0.8rem; color: #94a3b8;">단위: 원</div>
            </div>
            <div id="calendarGrid" class="calendar-grid">
                <div class="day-label" style="color:#ef4444">일</div><div class="day-label">월</div><div class="day-label">화</div>
                <div class="day-label">수</div><div class="day-label">목</div><div class="day-label">금</div><div class="day-label" style="color:#3b82f6">토</div>
            </div>
        </div>

        <div class="side-stack">
            <div class="card" style="margin:0;">
                <h4>카테고리별 비중</h4>
                <div id="categoryStats" style="margin-top: 15px;"></div>
            </div>
            <div class="card" style="margin:0;">
                <h4>최근 거래</h4>
                <ul id="recentList" style="list-style: none; margin-top: 10px; font-size: 0.85rem;"></ul>
            </div>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const assets = JSON.parse(localStorage.getItem('myAssets')) || [];
        const histories = JSON.parse(localStorage.getItem('myHistories')) || [];
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth(); // 0-11

        // 1. 기초 상단 데이터 계산
        const total = assets.reduce((sum, a) => sum + Number(a.balance), 0);
        document.getElementById('totalBalance').innerText = total.toLocaleString() + '원';

        const monthStr = now.toISOString().substring(0, 7);
        const monthHistories = histories.filter(h => h.date.startsWith(monthStr));
        const monthTotal = monthHistories.reduce((sum, h) => sum + Number(h.amount), 0);
        document.getElementById('monthExpense').innerText = monthTotal.toLocaleString() + '원';

        const todayStr = now.toISOString().substring(0, 10);
        const todayTotal = histories.filter(h => h.date === todayStr).reduce((sum, h) => sum + Number(h.amount), 0);
        document.getElementById('todayExpense').innerText = todayTotal.toLocaleString() + '원';

        // 2. 캘린더 생성 로직
        const calGrid = document.getElementById('calendarGrid');
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();

        // 시작 빈칸
        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            calGrid.appendChild(empty);
        }

        // 날짜 채우기
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const daySum = histories
                .filter(h => h.date === dateStr)
                .reduce((sum, h) => sum + Number(h.amount), 0);

            const cell = document.createElement('div');
            cell.className = 'day-cell' + (dateStr === todayStr ? ' today' : '');
            cell.innerHTML = `
                <span class="date-num">${d}</span>
                ${daySum > 0 ? `<span class="day-sum">-${daySum.toLocaleString()}</span>` : ''}
            `;
            calGrid.appendChild(cell);
        }

        // 3. 카테고리 통계 (Progress bar)
        const catStats = document.getElementById('categoryStats');
        const catMap = {};
        monthHistories.forEach(h => catMap[h.category] = (catMap[h.category] || 0) + Number(h.amount));

        catStats.innerHTML = Object.entries(catMap).map(([cat, amt]) => {
            const percent = ((amt / monthTotal) * 100).toFixed(0);
            return `
                <div style="margin-bottom: 12px;">
                    <div style="display:flex; justify-content:space-between; font-size: 0.75rem; margin-bottom: 4px;">
                        <span>${cat}</span><span>${percent}%</span>
                    </div>
                    <div style="width:100%; height:6px; background:#f1f5f9; border-radius:3px;">
                        <div style="width:${percent}%; height:100%; background:var(--primary); border-radius:3px;"></div>
                    </div>
                </div>`;
        }).join('') || '<p style="color:#94a3b8; font-size:0.8rem;">데이터 없음</p>';

        // 4. 최근 거래 3건만 요약
        const recentList = document.getElementById('recentList');
        recentList.innerHTML = histories.slice(0, 3).map(h => `
            <li style="padding: 8px 0; border-bottom: 1px solid #f8fafc; display:flex; justify-content:space-between;">
                <span>${h.description}</span>
                <span style="color:var(--expense); font-weight:600;">-${Number(h.amount).toLocaleString()}</span>
            </li>
        `).join('') || '<li>내역 없음</li>';
    });
</script>
</body>
</html>
